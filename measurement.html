<!DOCTYPE html>
<html lang="ja">
<head>
  <script type="module" src="./js/auth.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link href="./css/base.css" rel="stylesheet">
  <link href="./css/components.css" rel="stylesheet">
  <link href="./css/layout.css" rel="stylesheet">
  <link href="./css/utilities.css" rel="stylesheet">
  <link href="./css/measurement.css" rel="stylesheet">
  <script type="module" src="./js/measurement.js"></script>
  <title>まいにち！ラピ読 - 計測</title>
</head>
<body class="page page--measurement">

  <!-- 共通ヘッダー -->
  <header class="header">
    <div class="header__inner">
      <button id="homeBtn" class="btn btn--secondary header__back" onclick="location.href='index.html'">
        <span class="material-symbols-outlined">home</span>
        <span class="label">TOPへ</span>
      </button>
    </div>
  </header>

  <main class="container pb-ex">

    <!-- テキスト -->
    <section class="card card--main">
      <div class="card__header">
        <h2 class="card__title">本日のテキスト</h2>
        <span id="today-date" class="text-muted">m月d日（aaa）</span>
      </div>

      <div class="card__body">
        <h3 id="text-title" class="text-title">テキストタイトル</h3>
        <p id="text-category" class="text-category">テキストカテゴリ</p>
        <p id="text-body" class="text-body">テキスト本文</p>

        <div id="text-count" class="text-muted mt-8 text-right">文字数：xxx字</div>
      </div>
    </section>

    <!-- タイマーエリア -->
    <section class="timer-box">
      <div class="timer-row">
        <div id="timer-value" class="timer__value">00:00.00</div>
      </div>
      <div class="control-row">
        <button id="resetBtn" class="btn btn--secondary control__btn">
          <span class="material-symbols-outlined">replay</span>
          <span class="label">リセット</span>
        </button>

        <div class="controls__center">
          <button id="startPauseBtn" class="btn btn--primary btn--large control__start">
            <span class="material-symbols-outlined">play_arrow</span>
            <span class="label">開始</span>
          </button>
          <p class="controls__hint mt-0">タップで開始・停止を切替</p>
        </div>

        <button id="stopBtn" class="btn btn--secondary control__btn">
          <span class="material-symbols-outlined">stop</span>
          <span class="label">終了</span>
        </button>
      </div>
    </section>

  </main>
</body>
</html>
