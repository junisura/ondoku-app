<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link href="./css/base.css" rel="stylesheet">
  <link href="./css/components.css" rel="stylesheet">
  <link href="./css/layout.css" rel="stylesheet">
  <link href="./css/utilities.css" rel="stylesheet">
  <link href="./css/measurement.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./js/pages/measurement.js"></script>
  <title>まいにち！ラピ読 - 計測</title>
</head>
<body class="page page--measurement">

  <!-- 共通ヘッダー -->
  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="btn btn--secondary header__back">
        <span class="material-symbols-outlined">home</span>
        <span class="btn__label">TOPへ</span>
      </a>
      <img src="./img/rapidoku_logo_mini.png" height="40px" alt="">
    </div>
  </header>

  <main class="container pb-timer-space">

    <!-- テキスト -->
    <section class="card card--main">
      <div class="card__header">
        <h2 class="card__title">本日のテキスト</h2>
        <span id="today-date" class="text-muted"></span>
      </div>

      <div class="card__body">
        <h3 id="text-title" class="text-title"></h3>
        <div class="flex-area-center"><p class="category-frame">
          <span class="category-label">カテゴリ</span><span id="text-category" class="text-category"></span>
        </p></div>
        <p id="text-body" class="text-body"></p>
        <p id="text-count" class="text-muted mt-8 text-right"></p>
      </div>
    </section>

    <!-- タイマーエリア -->
    <section class="timer-box">
      <div class="timer-row">
        <div id="timer-value" class="timer__value">00:00.00</div>
      </div>
      <div class="control-row">
        <button id="resetBtn" type="button" class="btn btn--secondary control__btn btn--reset">
          <span class="material-symbols-outlined">replay</span>
          <span class="btn__label">リセット</span>
        </button>

        <div class="control__center">
          <button id="startPauseBtn" type="button" class="btn btn--primary btn--large control__start">
            <span class="material-symbols-outlined">play_arrow</span>
            <span class="btn__label">開始</span>
          </button>
          <p class="control__hint mt-8">タップで開始・停止を切替</p>
        </div>

        <button id="stopBtn" type="button" class="btn btn--secondary control__btn btn--stop">
          <span class="material-symbols-outlined">stop</span>
          <span class="btn__label">終了</span>
        </button>
      </div>
    </section>

  </main>
</body>
</html>
