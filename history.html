<!DOCTYPE html>
<html lang="ja">
<head>
  <script type="module" src="./js/auth.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <link href="./css/base.css" rel="stylesheet">
  <link href="./css/components.css" rel="stylesheet">
  <link href="./css/layout.css" rel="stylesheet">
  <link href="./css/utilities.css" rel="stylesheet">
  <link href="./css/calendar.css" rel="stylesheet">
  <script type="module" src="./js/history.js"></script>
  <title>まいにち！ラピ読 - 過去ログ</title>
</head>
<body class="page page--history">

  <!-- 共通ヘッダー -->
  <header class="header">
    <div class="header__inner">
      <a href="index.html" class="btn btn--secondary header__back">
        <span class="material-symbols-outlined">home</span>
        <span class="btn__label">TOPへ</span>
      </a>
    </div>
  </header>

  <main class="container">

    <!-- 連続記録 -->
    <section id="streak-section" class="card card--accent">
      <div class="card__header">
        <h3 class="card__title">連続記録</h3>
      </div>
      <div class="streak__value"><span id="streak-days" class="font-xl-sm"></span>日継続中！</div>
      <p id="warning" class="text-danger display-none font-small">今日の分がまだだよ！</p>
    </section>

    <!-- カレンダー -->
    <section class="card card--main mt-16">
      <div class="card__header flex-center-center">
        <div class="calendar__nav flex-area-center">
          <button id="prevYearBtn" class="btn btn--calendar material-symbols-outlined">keyboard_double_arrow_left</button>
          <button id="prevMonthBtn" class="btn btn--calendar material-symbols-outlined">keyboard_arrow_left</button>
          <span id="month-label" class="calendar__month">yyyy年m月</span>
          <button id="nextMonthBtn" class="btn btn--calendar material-symbols-outlined">keyboard_arrow_right</button>
          <button id="nextYearBtn" class="btn btn--calendar material-symbols-outlined">keyboard_double_arrow_right</button>
        </div>
      </div>

      <div class="card__body">
        <div class="calendar">

          <!-- 曜日 -->
          <div class="calendar__week calendar__grid">
            <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
          </div>
          <!-- 日付 -->
          <div id="calendar-date" class="calendar__grid">
          </div>

        </div>
      </div>
    </section>

    <!-- 選択日の記録 -->
    <section class="card card--sub mt-16">
      <div class="card__header">
        <h3 class="card__title"><span id="record-date">m月d日(aaa)</span>の記録</h3>
      </div>

      <ul id="records" class="list">
      </ul>
    </section>

    <!-- テキスト本文 -->
    <section id="text-section" class="card card--sub mt-16 display-none">
      <div class="card__header">
        <h3 id="text-title" class="card__title">テキストタイトル</h3>
        <p id="text-category" class="text-category">テキストカテゴリ</p>
      </div>

      <div class="card__body">
        <p id="text-body" class="text-body font-small">テキスト本文</p>
      </div>
    </section>

  </main>

  <template id="list-item-template">
    <li class="list__item">
      <div class="record-main">
        <span class="item__best text-best font-small material-symbols-outlined">　</span>
        <span class="item__timestamp text-center text-muted">hh:mi</span>
        <span class="item__time score font-large">mi:ss.sss</span>
        <span class="item__speed"><span class="speed score">x.xx</span><span class="unit font-small">文字/秒</span></span>
      </div>
      <div class="record-memo">
        <p class="item__memo"></p>
        <button class="memo-toggle" type="button">
          <span class="material-symbols-outlined">expand_more</span>
        </button>
      </div>
    </li>
  </template>
</body>
</html>
