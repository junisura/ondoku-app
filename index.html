<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link href="./common.css" rel="stylesheet">
  <script src="./common.js"></script>
  <script src="./timer.js"></script>
  <title>音読アプリ</title>
  <style>
    #timerBox {
      align-items: center;
      background: #000;
      border-radius: 8px;
      color: #fff;
      display: flex;
      font-size: large;
      gap: 0.5rem;
      padding: 0.5rem;
      position: fixed;
      top: 0.1rem;
      right: 0.1rem;
      z-index: 1000;
    }
    .timer-box button {
      padding: 0.5rem;
      width: 3rem;
    }
    
    #timerText {
      font-size: large;
      font-family: "JetBrains Mono", monospace;
      font-optical-sizing: auto;
      font-weight: 600;
      font-style: normal;
      min-width: 90px;
    }
    #title {
      font-size: x-large;
    }
    #genre {
      font-size: large;
    }
    #text {
      font-size: large;
    }
  </style>
</head>

<body>
  <div id="timerBox" class="timer-box">
    <button id="startPauseBtn" onclick="toggleTimer()" class="material-symbols-outlined">play_arrow</button>
    <span id="timerText">00:00.00</span>
    <button id="stopBtn" onclick="stopTimer()" class="hidden material-symbols-outlined">stop</button>
  </div>
  <button onclick="location.href='./logs.html'">過去ログを見る</button>
  <h1 id="title">読み込み中...</h1>
  <h2 id="genre"></h2>
  <div id="text"></div>
  <script>
    let contents = [];
    let current = null;
    
    async function loadData() {
      const res = await fetch("./contents.json");
      contents = await res.json();

      const today = new Date();
      const index = today.getDate() % contents.length;
      current = contents[index];

      document.getElementById("title").textContent = current.title;
      document.getElementById("genre").textContent = current.genre;
      document.getElementById("text").textContent = current.text;
    }
    
    function toggleTimer() {
      if (!Timer.isRunning) {
        Timer.start();
        document.getElementById("startPauseBtn").textContent = "pause";
      } else {
        Timer.pause();
        document.getElementById("startPauseBtn").textContent = "play_arrow";
      }
      document.getElementById("stopBtn").style.visibility ="visible";
    }
    
    function stopTimer() {
      if (!Timer.startTime && Timer.elapsedBeforePause === 0) return;

      const elapsed = Timer.stop();

      const charCount = current.text.length;
      const speed = charCount / elapsed;

      const result = {
        contentId: current.id,
        timeSec: elapsed,
        speed: speed
      };

      localStorage.setItem("ondoku_current_result", JSON.stringify(result));

      window.location.href = "result.html";
    }
    
    loadData();
  </script>
</body>
</html>
